<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑白切換雛形網站 - Three.js 版</title>

    <!-- 載入 GSAP 動畫引擎 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        :root {
            /* 淺色模式 (預設白底) */
            --bg-color: #f8f9fa;
            --text-color: #1a1a1a;
            --btn-bg: rgba(26, 26, 26, 0.75);
            --btn-text: #ffffff;
            --btn-border: rgba(255, 255, 255, 0.5);
            --btn-frosted-glow: rgba(255, 255, 255, 0.2);
            --btn-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            --toggle-bg: #d1d5db;
            --toggle-dot: #ffffff;
            --toggle-icon-sun: #f59e0b;
            --toggle-icon-moon: #4b5563;
        }

        [data-theme="dark"] {
            /* 深色模式 (黑底) */
            --bg-color: #121212;
            --text-color: #f8f9fa;
            --btn-bg: rgba(255, 255, 255, 0.8);
            --btn-text: #1a1a1a;
            --btn-border: rgba(0, 0, 0, 0.2);
            --btn-frosted-glow: rgba(0, 0, 0, 0.15);
            --btn-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
            --toggle-bg: #374151;
            --toggle-dot: #1a1a1a;
            --toggle-icon-sun: #fcd34d;
            --toggle-icon-moon: #ffffff;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', '-apple-system', 'Segoe UI', Roboto, sans-serif;
            transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                color 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #canvas-container canvas {
            display: block;
            outline: none;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 30;
            pointer-events: none;
        }

        .ui-element {
            pointer-events: auto;
        }

        /* 左上角切換按鈕 */
        .theme-switch-wrapper {
            position: absolute;
            top: 2rem;
            left: 2rem;
            display: flex;
            align-items: center;
        }

        .theme-switch {
            display: inline-block;
            width: 68px;
            height: 36px;
            position: relative;
            cursor: pointer;
        }

        .theme-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--toggle-bg);
            border-radius: 36px;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .slider-dot {
            position: absolute;
            height: 28px;
            width: 28px;
            left: 4px;
            bottom: 4px;
            background-color: var(--toggle-dot);
            border-radius: 50%;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.5s;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            z-index: 2;
        }

        input:checked+.slider .slider-dot {
            transform: translateX(32px);
        }

        input:checked+.slider {
            background-color: var(--toggle-bg);
        }

        .icon {
            position: absolute;
            width: 16px;
            height: 16px;
            top: 6px;
            left: 6px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .icon-sun {
            color: var(--toggle-icon-sun);
            opacity: 1;
            transform: rotate(0deg) scale(1);
        }

        .icon-moon {
            color: var(--toggle-icon-moon);
            opacity: 0;
            transform: rotate(-90deg) scale(0.5);
        }

        input:checked+.slider .icon-sun {
            opacity: 0;
            transform: rotate(90deg) scale(0.5);
        }

        input:checked+.slider .icon-moon {
            opacity: 1;
            transform: rotate(0deg) scale(1);
        }

        /* 中部下方按鈕 */
        .start-btn-container {
            position: absolute;
            bottom: 4rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .portfolio-text {
            font-size: 0.75rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            opacity: 0.6;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            pointer-events: none;
        }

        .start-btn {
            padding: 1rem 4.5rem;
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--btn-text);
            background: var(--btn-bg);
            border-radius: 9999px;
            border: 1px solid var(--btn-border);
            cursor: pointer;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: var(--btn-shadow), inset 0 0 15px var(--btn-frosted-glow);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .start-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2), inset 0 0 25px var(--btn-frosted-glow);
        }

        .start-btn:active {
            transform: translateY(0px);
        }

        /* 轉場斑馬線與選單容器 */
        .transition-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            padding: 0 20%;
            box-sizing: border-box;
            /* 兩側預留 20% 空間 */
        }

        .zebra-block {
            width: 20%;
            height: 100%;
            /* 若為 20%，3 塊加總 60%，剩下 40% 的 flex 空間會均分給 2 個間格（各也是 20%） */
            background-color: var(--text-color);
            transform-origin: left center;
            transform: scaleX(0);
            /* 初始完全隱藏 */
            transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .chess-piece {
            width: 120px;
            height: 120px;
            background-color: transparent;
            opacity: 0;
            pointer-events: none;
            /* 避免擋住後方文字的 Hover 感應 */
            margin-bottom: 0.5rem;
            transition: scale 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            scale: 1;
        }

        /* 當滑鼠停在選單項目上方時，裡面的棋子會額外放大約 1/3 */
        .menu-item:hover .chess-piece {
            scale: 1.33;
        }

        .menu-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 21;
            opacity: 0;
            pointer-events: none;
            display: flex;
            padding: 0 20%;
            box-sizing: border-box;
        }

        .menu-item {
            width: 20%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            box-sizing: border-box;
            padding: 0 10px;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease, color 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-item:hover {
            transform: scale(1.1);
        }

        .menu-content:has(.menu-item:hover) .menu-item:not(:hover) {
            opacity: 0.4;
        }

        .menu-item .en {
            font-size: clamp(0.75rem, 1.2vw, 1.1rem);
            font-weight: 700;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-family: 'Inter', sans-serif;
            line-height: 1.3;
        }

        .menu-item .zh {
            font-size: clamp(0.6rem, 0.9vw, 0.85rem);
            font-weight: 500;
            letter-spacing: 0.2em;
            opacity: 0.8;
            line-height: 1.4;
        }

        /* 奇數項落在斑馬線方塊上，背景為 text-color (預設黑)，因此文字需為 bg-color (預設白) */
        .menu-item:nth-child(odd) {
            color: var(--bg-color);
        }

        /* 偶數項落在兩條斑馬線間的空隙，透出 body 背景 bg-color (預設白)，因此文字需為 text-color (預設黑) */
        .menu-item:nth-child(even) {
            color: var(--text-color);
        }

        .back-btn {
            position: absolute;
            top: 5rem;
            left: 2rem;
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            padding: 0.5rem;
            margin: 0;
            border-bottom: 1px solid transparent;
            transition: color 0.6s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s;
        }

        .back-btn:hover {
            border-bottom: 1px solid var(--text-color);
        }

        /* 1. 隱藏全網頁預設游標 */
        * {
            cursor: none !important;
        }

        /* 2. CSS 日夜模式變色與基礎設定 */
        .custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
            pointer-events: none;
            /* 確保準心置中 */
            transform: translate(-50%, -50%);
            width: 24px; /* 整體縮小 1/4 (由 32px 變為 24px) */
            height: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .custom-cursor svg {
            width: 100%;
            height: auto;
            overflow: visible;
        }

        /* 顏色連動（關鍵） */
        .custom-cursor svg path {
            fill: #1a1a1a;   /* 預設（淺色模式）下為深色 */
            stroke: #ffffff; /* 預設（淺色模式）下為白色 */
            
            /* 【主要修改】：讓外框線向外長 */
            stroke-width: 4px;         /* 寬度加倍，因為其中一半會被 fill 覆蓋 */
            paint-order: stroke fill;  /* 關鍵！告訴瀏覽器「先畫線條，再塗滿顏色」，這會讓顏色蓋住往內長的線條 */
            stroke-linejoin: round;    /* 讓線條轉折處圓滑，避免外框產生奇怪的尖刺 */
            
            transition: all 0.4s ease;
        }

        [data-theme="dark"] .custom-cursor svg path {
            fill: #ffffff;   /* 當啟動深色模式時：fill 為白色 */
            stroke: #1a1a1a; /* stroke 為深色 */
        }

        /* =============== 內頁轉場新增區段 =============== */
        /* 導覽列 */
        .top-nav {
            position: absolute;
            top: 2rem;
            right: 2rem;
            display: flex;
            gap: 1rem;
            z-index: 40;
            pointer-events: none;
        }

        .nav-btn {
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--text-color);
            padding: 0.5rem 1.25rem;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), 
                        color 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                        box-shadow 0.4s ease; /* 新增陰影的動畫讓加粗效果更自然 */
            opacity: 0; /* 起始隱藏，等待 GSAP 動畫進場 */
            pointer-events: auto; /* 雖然 container 把 events 關掉了但在啟動後這裡要能點 */
        }

        .nav-btn:hover {
            /* 在原本 1px 的基礎下向內再擴展 1px，等同於往內加粗不影響佈局 */
            box-shadow: inset 0 0 0 1px var(--text-color);
        }

        .nav-btn.active {
            background: var(--text-color);
            color: var(--bg-color);
        }

        /* 標題文字容器 */
        #title-container {
            position: absolute;
            top: 50%;
            left: 55%; /* 偏右對齊 */
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            z-index: 35;
            color: var(--text-color);
            pointer-events: none;
            opacity: 0; /* 起始隱藏 */
        }

        #title-container .en-title {
            font-size: clamp(2.5rem, 4vw, 4.5rem);
            font-weight: 800;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            line-height: 1.1;
            font-family: 'Inter', sans-serif;
        }

        #title-container .zh-title {
            font-size: clamp(1.2rem, 1.8vw, 1.8rem);
            font-weight: 600;
            letter-spacing: 0.2em;
            opacity: 0.8;
            font-family: 'Inter', sans-serif;
        }

        /* 內容容器通用樣式 */
        .content-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 10%;
            box-sizing: border-box;
            z-index: 38;
            opacity: 0;
            pointer-events: none;
            color: var(--text-color);
            gap: 8vw;
        }

        /* 打亂按鈕樣式 */
        .scramble-btn {
            position: absolute;
            left: 2rem;
            top: 50%;
            transform: translateY(-50%) translateX(-20px);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 1rem 2rem; /* 稍微增加左右 padding 以配合圓角 */
            border: 1px solid var(--text-color);
            background: transparent;
            border-radius: 999px; /* 左右半圓倒角 */
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), 
                        transform 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                        background-color 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                        color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Inter', sans-serif;
            z-index: 45;
        }

        .scramble-btn:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
        }

        .scramble-en {
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .scramble-zh {
            font-size: 0.75rem;
            opacity: 0.7;
            letter-spacing: 0.4em;
            margin-top: 0.2rem;
        }

        /* 計時器樣式 */
        .timer-container {
            position: absolute;
            bottom: 4rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            display: flex;
            align-items: center;
            gap: 1.5rem;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), 
                        transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .timer-display {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-color);
            letter-spacing: 1px;
            min-width: 140px; /* 防止寬度跳動 */
            text-align: center;
        }

        .timer-btn {
            padding: 0.8rem 1.8rem;
            border: 1px solid var(--text-color);
            background: var(--btn-bg);
            color: var(--btn-text);
            border-radius: 9999px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .timer-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            background: var(--text-color);
            color: var(--bg-color);
        }

        #timer-reset-btn {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        /* 個人履歷頁面樣式 */
        .resume-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 10%;
            box-sizing: border-box;
            z-index: 38;
            opacity: 0;
            pointer-events: none;
            color: var(--text-color);
            gap: 8vw;
        }

        /* 左側：圖片與行星軌道 */
        .resume-left {
            position: relative;
            flex: 0 0 540px; /* 稍微放大容器寬度以容納大圓 */
            height: 540px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-circle-a {
            position: absolute;
            width: 475px; /* 380 * 1.25 */
            height: 475px;
            background-color: var(--text-color);
            border-radius: 50%;
            z-index: 1;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .resume-photo {
            position: relative;
            width: 375px; /* 300 * 1.25 */
            height: 500px; /* 400 * 1.25 */
            object-fit: cover;
            border-radius: 24px;
            z-index: 5;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        /* 行星軌道系統 */
        .planet-orbit {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .planet {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100px; /* 控制旋轉半徑的容器 */
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .planet-core {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: background-color 0.6s, border-color 0.6s;
        }

        .planet-core.solid {
            background-color: var(--bg-color);
        }

        .planet-core.hollow {
            background-color: transparent;
            border: 2px solid var(--bg-color);
        }

        /* 右側：文字資訊 */
        .resume-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 3rem;
        }

        .info-block {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .name-row {
            display: flex;
            align-items: baseline;
            gap: 1.5rem;
        }

        .name-en {
            font-size: clamp(2rem, 3.3vw, 3.7rem); /* (3~5.5) * 0.66 */
            font-weight: 200;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            line-height: 1;
        }

        .name-zh {
            font-size: 1.2rem; /* 1.8 * 0.66 */
            font-weight: 500;
            letter-spacing: 0.3em;
            opacity: 0.8;
        }

        .info-label {
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            opacity: 0.5;
            margin-bottom: 0.2rem;
        }

        .info-content {
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        .info-gmail {
            font-size: 1.3rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            opacity: 0.9;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>

<body>

    <!-- 1. HTML 結構 (Inline SVG 關鍵) -->
    <div class="custom-cursor">
        <svg id="_圖層_1" data-name="圖層 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 75.57 113.78">

    <script>
        // 日夜模式切換
        document.getElementById('theme-toggle').addEventListener('change', function (e) {
            document.documentElement.setAttribute('data-theme', e.target.checked ? 'dark' : 'light');
        });

        // ================= 3. GSAP 自訂游標與互動邏輯 =================
        const cursor = document.querySelector('.custom-cursor');
        
        // 保留 translate 置中不被覆寫，並加入 -30 度旋轉，以及防閃爍的初始隱藏 (autoAlpha: 0)
        gsap.set(cursor, { xPercent: -50, yPercent: -50, rotation: -30, autoAlpha: 0 });

        let isCursorVisible = false;

        // 監聽鼠標移動，以 GSAP 營造平滑的水潤阻尼感
        window.addEventListener('mousemove', (e) => {
            // 滑鼠有動作時確保游標顯示
            if (!isCursorVisible) {
                gsap.to(cursor, { autoAlpha: 1, duration: 0.3 });
                isCursorVisible = true;
            }
            gsap.to(cursor, {
                x: e.clientX,
                y: e.clientY,
                duration: 0.15,
                ease: "power2.out"
            });
        });

        // 游標移出視窗時隱藏游標
        document.addEventListener('mouseleave', () => {
            gsap.to(cursor, { autoAlpha: 0, duration: 0.3 });
            isCursorVisible = false;
        });

        // 游標重回視窗時顯示游標
        document.addEventListener('mouseenter', () => {
            gsap.to(cursor, { autoAlpha: 1, duration: 0.3 });
            isCursorVisible = true;
        });

        const interactives = document.querySelectorAll('button, a, label, .menu-item, .scramble-btn, .timer-btn');
        interactives.forEach(el => {
            el.addEventListener('mouseenter', () => {
                gsap.to(cursor, { scale: 1.25, duration: 0.3, ease: "power2.out" });
            });
            el.addEventListener('mouseleave', () => {
                gsap.to(cursor, { scale: 1, duration: 0.3, ease: "power2.out" });
            });
        });
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        const container = document.getElementById('canvas-container');

        // 初始化場景
        const scene = new THREE.Scene();

        // 渲染器：使用透明背景接收 body 的黑白顏色
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // 建立 PMREMGenerator 與環境光貼圖，增強金屬反射的高光邊緣質感
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

        // 攝影機
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5);
        camera.lookAt(0, 0, 0);

        // 光源
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5); // 原本 2.5，微調以讓反射更明顯
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 3);
        directionalLight.position.set(5, 10, 5);
        directionalLight.castShadow = true;
        scene.add(directionalLight);

        // 新增一個輔助光源，確保邊角與金屬面有足夠的高光反射
        const fillLight = new THREE.DirectionalLight(0xffffff, 1.5);
        fillLight.position.set(-5, 5, -5);
        scene.add(fillLight);

        // 控制器
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0, 0);
        controls.enableZoom = true; // 確保縮放功能
        controls.enablePan = false; // 禁止右鍵平移

        // ================= 高質感粒子背景 =================
        // 動態生成圓形 canvas 作為粒子 map，避免預設的正方形
        const canvas = document.createElement('canvas');
        canvas.width = 32;
        canvas.height = 32;
        const context = canvas.getContext('2d');
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = canvas.width / 2;

        context.beginPath();
        context.arc(centerX, centerY, radius, 0, 2 * Math.PI, false);
        context.fillStyle = '#ffffff';
        context.fill();

        const particleTexture = new THREE.CanvasTexture(canvas);

        // 建立 1000 個粒子
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 1000;
        const posArray = new Float32Array(particlesCount * 3);
        const particleRange = 40; // 分佈於 (-20, 20) 的廣大空間

        for (let i = 0; i < particlesCount * 3; i++) {
            // Math.random() 範圍是 0 ~ 1，減 0.5 後為 -0.5 ~ 0.5，乘上 40 即 -20 ~ 20
            posArray[i] = (Math.random() - 0.5) * particleRange;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

        // 設定材質：透明度 0.4、關閉深度寫入
        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.15,
            map: particleTexture,
            transparent: true,
            opacity: 0.5, // 稍微調高透明度以增加實體感
            depthWrite: false,
            color: 0x222222, // 預設(淺色模式)改為更深的近黑色
            blending: THREE.NormalBlending // 淺色模式必須用正常混合，避免白底曝光融合
        });

        // 動態監聽日夜模式切換
        const themeToggle = document.getElementById('theme-toggle');
        if (themeToggle.checked) {
            particlesMaterial.color.setHex(0xaaaaaa);
            particlesMaterial.blending = THREE.AdditiveBlending; // 深色模式保留光暈疊加
        }

        themeToggle.addEventListener('change', (e) => {
            if (e.target.checked) {
                particlesMaterial.color.setHex(0xaaaaaa); // 深色/黑色模式：淡灰色
                particlesMaterial.blending = THREE.AdditiveBlending;
            } else {
                particlesMaterial.color.setHex(0x222222); // 淺色/白色模式：加深的深灰色
                particlesMaterial.blending = THREE.NormalBlending;
            }
            particlesMaterial.needsUpdate = true; // 強制更新材質混合模式
        });

        const particlesGroup = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesGroup);

        // ================= 模型載入與位置完美居中 =================
        const loader = new GLTFLoader();
        let loadedModel = new THREE.Group(); // 最外層容器
        loadedModel.userData = { targetScale: 0.001, extraSpin: 0 }; // 預防初始化前的存取
        scene.add(loadedModel);

        let bwCube = null;
        let colorCube = null;
        let modelInner = null; // 當前正在操作的魔方 Root (可能是 bwCube 或 colorCube)
        let isShuffling = false;

        // 載入黑白魔方
        function loadBW() {
            return new Promise((resolve) => {
                loader.load('MagicCube.glb', (gltf) => {
                    const model = gltf.scene;
                    model.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                            const mat = child.material;
                            if (mat && mat.color) {
                                const { r, g, b } = mat.color;
                                const isDark = (r + g + b) < 0.5 || (mat.name && mat.name.toLowerCase().includes('black'));
                                child.material = new THREE.MeshStandardMaterial({
                                    color: mat.color.getHex(),
                                    metalness: isDark ? 1.0 : 0.0,
                                    roughness: isDark ? 0.25 : 1.0
                                });
                            }
                        }
                    });
                    const puzzleRoot = setupPuzzleRoot(model);
                    bwCube = puzzleRoot;
                    loadedModel.add(bwCube);
                    resolve();
                });
            });
        }

        // 載入彩色魔方
        function loadColor() {
            return new Promise((resolve) => {
                loader.load('colorMagicCube.glb', (gltf) => {
                    const model = gltf.scene;
                    model.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                            // 彩色魔方保留原始材質
                        }
                    });
                    const puzzleRoot = setupPuzzleRoot(model);
                    colorCube = puzzleRoot;
                    colorCube.visible = false; // 初始隱藏
                    loadedModel.add(colorCube);
                    resolve();
                });
            });
        }

        function setupPuzzleRoot(model) {
            const puzzleRoot = new THREE.Group();
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());

            model.position.x = -center.x;
            model.position.y = -center.y;
            model.position.z = -center.z;
            puzzleRoot.add(model);

            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 0.85 / (maxDim || 1);
            puzzleRoot.userData.targetScale = scale;

            return puzzleRoot;
        }

        Promise.all([loadBW(), loadColor()]).then(() => {
            modelInner = bwCube;
            
            loadedModel.scale.setScalar(0.001);
            loadedModel.position.set(0, 5, -15);
            loadedModel.userData.targetScale = bwCube.userData.targetScale;
            loadedModel.userData.extraSpin = 25;
            
            camera.lookAt(0, 0, 0);
        });


        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }, false);

        // ================= 全域變數與滑鼠游標監聽 =================
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let dragStartPoint = null;
        let clickedPoint = null;
        let clickedCubie = null;
        let isPlayMode = false;

        let mouseX = 0;
        let mouseY = 0;
        window.addEventListener('mousemove', (event) => {
            // 將螢幕座標轉換為歸一化的 WebGL 座標 (-1 到 1)
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // ================= 平滑視差動畫 (The Lerp Effect) =================
            if (particlesGroup) {
                // 目標 X 軸旋轉受 mouseY 影響，Y 軸受 mouseX 影響
                // 設定 Lerp Factor 為 0.05 營造水中的高級阻尼感
                particlesGroup.rotation.x = THREE.MathUtils.lerp(particlesGroup.rotation.x, mouseY * 0.2, 0.05);
                particlesGroup.rotation.y = THREE.MathUtils.lerp(particlesGroup.rotation.y, mouseX * 0.2, 0.05);
            }

            if (loadedModel) {
                // 平滑入場動畫 (Frame-rate independent lerp)
                const lerpFactor = 1 - Math.exp(-6 * delta);

                loadedModel.scale.x = THREE.MathUtils.lerp(loadedModel.scale.x, loadedModel.userData.targetScale, lerpFactor);
                loadedModel.scale.y = loadedModel.scale.x;
                loadedModel.scale.z = loadedModel.scale.x;

                loadedModel.position.y = THREE.MathUtils.lerp(loadedModel.position.y, 0, lerpFactor);
                loadedModel.position.z = THREE.MathUtils.lerp(loadedModel.position.z, 0, lerpFactor);

                // 旋轉速度控制
                let spinSpeed = 0.5;
                if (loadedModel.userData.extraSpin > 0) {
                    spinSpeed += loadedModel.userData.extraSpin;
                    loadedModel.userData.extraSpin = THREE.MathUtils.lerp(loadedModel.userData.extraSpin, 0, lerpFactor * 0.8);
                }

                // === 若正在洗牌或遊玩，則中止整體的緩慢自轉，讓解題視角固定 ===
                if (!isShuffling && !isPlayMode) {

                }
            }

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // ================= 遊玩模式：雙擊進入與滑鼠拖曳判定 =================
        window.addEventListener('dblclick', (e) => {
            if (isShuffling || !bwCube || !colorCube) return;
            
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const cubies = [];
            bwCube.traverse(child => { if (child.isMesh) cubies.push(child); });

            const intersects = raycaster.intersectObjects(cubies);
            if (intersects.length > 0 && !isPlayMode) {
                isPlayMode = true;
                isShuffling = true; // 鎖定期間

        window.addEventListener('pointerdown', (e) => {
            if (!isPlayMode || isShuffling || !modelInner) return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const cubies = [];
            modelInner.traverse(child => { if (child.isMesh) cubies.push(child); });

            const intersects = raycaster.intersectObjects(cubies);
            if (intersects.length > 0) {
                controls.enableRotate = false; // 點中方塊時停止鏡頭旋轉
                clickedCubie = intersects[0].object;
                clickedPoint = intersects[0].point.clone(); // 記錄精準的世界座標點
                dragStartPoint = { x: e.clientX, y: e.clientY };

        window.addEventListener('pointerup', (e) => {
            controls.enableRotate = true; // 全面恢復鏡頭旋轉
            if (!isPlayMode || isShuffling || !clickedCubie || !dragStartPoint) return;

            const deltaX = e.clientX - dragStartPoint.x;
            const deltaY = e.clientY - dragStartPoint.y;

            if (Math.abs(deltaX) < 20 && Math.abs(deltaY) < 20) {
                dragStartPoint = null;
                clickedCubie = null;
                return;
            }

            isShuffling = true;

            // [終極修復：2D 螢幕投影預測比對法]
            const localPoint = clickedPoint.clone();
            modelInner.worldToLocal(localPoint);
            const absX = Math.abs(localPoint.x);
            const absY = Math.abs(localPoint.y);
            const absZ = Math.abs(localPoint.z);

            // 1. 找出被點擊的法線軸向 (Normal Axis)
            let normalAxis = 'z';
            if (absX > absY && absX > absZ) normalAxis = 'x';
            else if (absY > absX && absY > absZ) normalAxis = 'y';

            // 2. 決定這個面可以旋轉的兩個有效軸 (例如點擊 Z 面，只能繞 X 或 Y 軸旋轉)
            let axesToTest = [];
            if (normalAxis === 'x') axesToTest = ['y', 'z'];
            else if (normalAxis === 'y') axesToTest = ['x', 'z'];
            else axesToTest = ['x', 'y'];

            // 3. 取得點擊點在螢幕上的 2D 基準座標 (NDC 空間)
            const screenPoint = clickedPoint.clone().project(camera);

            // 4. 計算函式：預測繞著某個軸旋轉一小步後，在螢幕上會產生什麼方向的像素位移
            function getScreenVectorForAxis(axisName) {
                const axisVector = new THREE.Vector3();
                axisVector[axisName] = 1;
                
                // 微小旋轉造成的局部座標位移 (Displacement = Axis x LocalPoint)
                const moveLocal = new THREE.Vector3().crossVectors(axisVector, localPoint).normalize().multiplyScalar(0.1);
                const movedWorld = localPoint.clone().add(moveLocal);
                modelInner.localToWorld(movedWorld);

                const movedScreen = movedWorld.project(camera);
                
                // 轉換為實際的像素位移向量 (注意螢幕 Y 軸向下為正，需反轉)
                return new THREE.Vector2(
                    (movedScreen.x - screenPoint.x) * (window.innerWidth / 2),
                    -(movedScreen.y - screenPoint.y) * (window.innerHeight / 2)
                );
            }

            // 取得兩個可能旋轉軸的螢幕預測方向
            const vec1 = getScreenVectorForAxis(axesToTest[0]);
            const vec2 = getScreenVectorForAxis(axesToTest[1]);

            // 玩家實際拖曳的像素向量
            const dragVec = new THREE.Vector2(deltaX, deltaY);

            // 5. 使用內積 (Dot Product) 比較拖曳向量與哪個預測向量最吻合
            const dot1 = dragVec.dot(vec1);
            const dot2 = dragVec.dot(vec2);

            let axis, dir;
            // 誰的絕對值大，代表玩家的拖曳軌跡與該軸的旋轉結果越相似
            if (Math.abs(dot1) > Math.abs(dot2)) {
                axis = axesToTest[0];
                dir = dot1 > 0 ? 1 : -1;
            } else {
                axis = axesToTest[1];
                dir = dot2 > 0 ? 1 : -1;
            }

            const angle = dir * (Math.PI / 2);

            modelInner.updateMatrixWorld(true);

            const targetBox = new THREE.Box3().setFromObject(clickedCubie);
            const targetCenter = targetBox.getCenter(new THREE.Vector3());
            modelInner.worldToLocal(targetCenter);
            const targetVal = targetCenter[axis];

            const cubies = [];
            modelInner.traverse(child => { if (child.isMesh) cubies.push(child); });

            const layerCubies = [];
            cubies.forEach(c => {
                const tempBox = new THREE.Box3().setFromObject(c);
                const center = tempBox.getCenter(new THREE.Vector3());
                modelInner.worldToLocal(center);
                if (Math.abs(center[axis] - targetVal) < 0.2) {
                    layerCubies.push(c);
                }
            });

            const pivot = new THREE.Object3D();
            modelInner.add(pivot);
            pivot.updateMatrixWorld(true);

            layerCubies.forEach(c => pivot.attach(c));

            gsap.to(pivot.rotation, {
                [axis]: angle,
                duration: 0.3,
                ease: "power2.inOut",
                onComplete: () => {
                    pivot.updateMatrixWorld(true);
                    layerCubies.forEach(c => modelInner.attach(c));
                    modelInner.remove(pivot);
                    
                    isShuffling = false;
                    dragStartPoint = null;
                    clickedCubie = null;
                }
            });
        });


        // ================= 魔術方塊解謎洗牌邏輯 =================
        const btn = document.getElementById('solve-btn');
        btn.addEventListener('click', async () => {
            if (isShuffling || !modelInner) return;
            isShuffling = true;

            const axes = ['x', 'y', 'z'];

            // 找出所有的小方塊 Meshes
            const cubies = [];
            modelInner.traverse(child => {
                if (child.isMesh) cubies.push(child);
            });

            // 循環 5 次，花費總時間約 200ms * 5 = 1秒
            for (let i = 0; i < 5; i++) {
                await new Promise((resolve) => {
                    const axis = axes[Math.floor(Math.random() * axes.length)];
                    const angle = (Math.random() > 0.5 ? 1 : -1) * (Math.PI / 2); // 90度 或 -90度

                    // [關鍵修復]：在獲取座標前強制更新模型矩陣，確保世界座標數據沒有殘留上次旋轉的延遲
                    modelInner.updateMatrixWorld(true);

                    // 計算每個方塊以世界座標投影回內部座標系的實際中心位置，用以判斷層級
                    const positions = cubies.map(c => {
                        const tempBox = new THREE.Box3().setFromObject(c);
                        const center = tempBox.getCenter(new THREE.Vector3());
                        modelInner.worldToLocal(center);
                        return { cubie: c, val: center[axis] };
                    });

                    // 隨機挑選某個方塊的座標當基準層 (這樣就保證能選到其中一層)
                    const randomVal = positions[Math.floor(Math.random() * positions.length)].val;

                    // 選出和該方塊座標接近的同層所有方塊 (容差 0.2，以應對浮點數誤差)
                    const layerCubies = positions
                        .filter(p => Math.abs(p.val - randomVal) < 0.2)
                        .map(p => p.cubie);

                    // [關鍵修復]：每次旋轉都建立全新的臨時 Pivot，徹底避免矩陣殘留污染
                    const pivot = new THREE.Object3D();
                    modelInner.add(pivot);
                    pivot.updateMatrixWorld(true); // 立即更新矩陣

                    // 使用 .attach() 轉移父層，這樣小方塊會保留它們的絕對位置跟旋轉
                    layerCubies.forEach(c => pivot.attach(c));

                    // 透過 GSAP 對樞紐執行旋轉動畫 (耗時 0.2 秒)
                    gsap.to(pivot.rotation, {
                        [axis]: angle,
                        duration: 0.2,
                        ease: "power2.inOut",
                        onComplete: () => {
                            // [關鍵修復之更新世界矩陣]：
                            // 強制 Three.js 結算這次 GSAP 所產生出來的旋轉
                            pivot.updateMatrixWorld(true);

                            // [解除臨時群組與重新加入場景]：
                            // re-attach 會自動合併 Pivot 產生的幾何體矩陣並抹除位移誤差
                            layerCubies.forEach(c => modelInner.attach(c));

                            // 清除臨時群組
                            modelInner.remove(pivot);
                            resolve(); // 繼續下一個序列
                        }
                    });
                });
            }

            // 洗牌結束，執行「炸開並縮小消失」特效
            // 在爆炸時同步執行：撤除舊元素 (注意：這次刪除了 theme-switch-wrapper 的漸隱，讓它保留)
            gsap.to('.start-btn-container', { opacity: 0, duration: 0.8, ease: "power2.out", pointerEvents: "none" });
            gsap.to(particlesGroup.material, { opacity: 0, duration: 0.8, ease: "power2.out" });

            const explosionPromises = cubies.map(c => {
                // 記下爆炸前一瞬間（已洗過牌）的真實空間座標，供未來返回上一頁組合時使用
                c.userData.shuffledPosition = c.position.clone();

                return new Promise(resolve => {
                    // 獲取當前座標向量以決定爆裂方向
                    const direction = c.position.clone();

                    // 防呆處理：如果是藏在魔方最核心中心的那塊 (0,0,0)，normalize 會噴出 NaN
                    // 我們給它一個隨機微小方向，讓它也能炸飛
                    if (direction.lengthSq() < 0.0001) {
                        direction.set(Math.random() - 0.5, Math.random() - 0.5, Math.random() - 0.5);
                    }

                    // 將向量標準化並乘上 4 倍推力，得出目標座標
                    direction.normalize();
                    const targetPos = direction.multiplyScalar(4);

                    // GSAP 同時執行位置移動與縮放至 0
                    gsap.to(c.position, {
                        x: targetPos.x,
                        y: targetPos.y,
                        z: targetPos.z,
                        duration: 0.8,
                        ease: "power2.out" // 起頭爆發力強，收尾柔和緩慢
                    });

                    gsap.to(c.scale, {
                        x: 0,
                        y: 0,
                        z: 0,
                        duration: 0.8,
                        ease: "power2.out",
                        onComplete: resolve // 此方塊動畫完畢後回報
                    });
                });
            });

            // 等待所有 26~27 塊小方塊皆確實炸飛消失
            await Promise.all(explosionPromises);

            // 啟動斑馬線橫向生長動畫 timeline

                    isShuffling = false;

            tl.to('.zebra-block', {
                scaleX: 1,
                duration: 1,
                stagger: 0.1,
                ease: "power3.inOut" // 營造鋼琴鍵般的節奏感
            })
                // 隨後淡入選單文字與返回按鈕做結尾
                .to(['#menu-content', '#back-btn'], {
                    opacity: 1,

                // 與文字同步執行：西洋棋落下，加上 staggered 呈現節奏感

                pieces.forEach((piece, index) => {
                    const pos = index === 0 ? "<" : "<0.1";
                    tl.fromTo(piece,
                        { y: -80, opacity: 0 },

        // ================= 計時器邏輯 =================
        let timerInterval = null;

        function updateTimerDisplay() {
            const now = Date.now();
            const diff = now - startTime + elapsedTime;
            
            const m = Math.floor(diff / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            const ms = Math.floor((diff % 1000) / 10);
            
            timerDisplay.innerText = 
                `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}:${ms.toString().padStart(2, '0')}`;
        }

                navBtns[index + 1].classList.add('active'); // 第 0 個是 '選單' 按鈕

                // 為了讓這顆棋子能自由移動不受 Flexbox 影響，讀取它的目前絕對位置並轉為 position: fixed
                const rect = clickedPiece.getBoundingClientRect();
                
                // 停止自轉
                clickedPiece.autoRotate = false;

                // 關閉所有選單互動
                menuItemsDOM.forEach(m => m.style.pointerEvents = 'none');

                // 🌟 建立透明替身撐住原本的空間，防止文字往上跳
                const placeholder = document.createElement('div');
                placeholder.style.width = rect.width + 'px';
                placeholder.style.height = rect.height + 'px';
                placeholder.style.marginBottom = '0.5rem'; // 必須對齊原本 .chess-piece 的 margin
                placeholder.classList.add('chess-placeholder');
                item.insertBefore(placeholder, clickedPiece);

                gsap.set(clickedPiece, {
                    position: 'fixed',
                    left: rect.left,
                    top: rect.top,
                    width: rect.width,
                    height: rect.height,
                    margin: 0,
                    zIndex: 100
                });
                
                // 將它從原來的容器提出來獨立放在 body，避免等下其他東西消失影響它
                document.body.appendChild(clickedPiece);

                const tl = gsap.timeline();

                // 1. 退場：未點中的元素與斑馬線退場
                tl.to('.zebra-block', { scaleX: 0, duration: 0.8, ease: "power3.inOut" }, 0);
                tl.to([...siblings, '#back-btn'], { opacity: 0, duration: 0.6, ease: "power2.out" }, 0);
                tl.to([item.querySelector('.en'), item.querySelector('.zh')], { opacity: 0, duration: 0.4 }, 0);

                // 2. 棋子 Solo 動畫
                tl.to(clickedPiece, {
                    left: '20vw',
                    top: '50vh',
                    xPercent: -50,
                    yPercent: -50,
                    scale: 2.5,
                    filter: "blur(1.5px)",
                    duration: 0.8,
                    ease: "power3.inOut",
                    onUpdate: function() {
                        const p = this.progress();
                        clickedPiece.setAttribute('camera-orbit', `${90 * p}deg 90deg auto`);
                    }
                }, 0.2);

                // 3. 文字滑入與消散序列
                tl.add(() => {
                    titleContainer.innerHTML = `<div class="en-title">${enText}</div><div class="zh-title">${zhText}</div>`;
                }, "-=0.4");

                tl.fromTo(titleContainer, 
                    { x: 50, opacity: 0 },
                    { x: 0, opacity: 1, duration: 0.6, ease: "power2.out" },
                    "-=0.2"
                );

                tl.to({}, { duration: 1 });

                tl.to(titleContainer, { x: -50, opacity: 0, duration: 0.6, ease: "power2.in" });

                tl.to(clickedPiece, {
                    opacity: 0,
                    duration: 0.6,
                    ease: "power2.inOut",
                    onComplete: () => {
                        clickedPiece.style.display = 'none';
                        activePiece = clickedPiece;
                        activeParent = item;
                    }
                }, "<");

                // 4. 內容區進場 (利用字典自動判斷通用的進場邏輯)
                const targetPage = pagesInfo[index];
                if (targetPage) {
                    currentIdx = index; // 更新當前索引
                    tl.fromTo(targetPage, 
                        { opacity: 0, y: 30 },
                        { opacity: 1, y: 0, pointerEvents: 'auto', duration: 0.8, ease: "power2.out" }
                    );
                }

                // 5. 導覽列進場
                tl.to(navBtns, {
                    opacity: 1,
                    stagger: 0.1,
                    duration: 0.5,
                    ease: "power2.out",
                    onComplete: () => {
                        topNav.style.pointerEvents = 'auto';
                        isShuffling = false;
                    }
                });
            });
        });

        // ================= 導覽列按鈕切換內容邏輯 =================

        navBtns.forEach((btn) => {
            btn.addEventListener('click', () => {
                const target = btn.getAttribute('data-target');
                if (target === 'back') return;
                
                const targetIdx = parseInt(target);
                if (targetIdx === currentIdx) return; // 點擊同頁不重複觸發

                // 1. 建立切換時間軸
                const tl = gsap.timeline();

                // 2. 淡出目前頁面
                const currentPage = pagesInfo[currentIdx];
                if (currentPage) {
                    tl.to(currentPage, { 
                        opacity: 0, 
                        y: -20, 
                        duration: 0.4, 
                        ease: "power2.in",
                        onComplete: () => {
                            currentPage.style.pointerEvents = 'none';
                        }
                    });
                }

                // 3. 切換 Active 狀態並更新索引
                tl.add(() => {
                    navBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });

                // 4. 淡入新頁面
                const nextPage = pagesInfo[targetIdx];
                if (nextPage) {
                    currentIdx = targetIdx; // 更新索引
                    tl.fromTo(nextPage, 
                        { opacity: 0, y: 20 }, 
                        { opacity: 1, y: 0, pointerEvents: 'auto', duration: 0.6, ease: "power2.out" }
                    );
                }
            });
        });

        // ================= 返回歡迎頁面的重置邏輯 =================
        const backBtn = document.getElementById('back-btn');
        backBtn.addEventListener('click', () => {
            if (isShuffling) return; // 鎖定判定
            isShuffling = true;

            // 處理遊玩模式下點擊返回
            if (isPlayMode) {
                isPlayMode = false;
                isShuffling = true;

                gsap.to('#back-btn', { opacity: 0, pointerEvents: 'none', duration: 0.4, ease: "power2.out" });
                gsap.to('#scramble-btn', { opacity: 0, x: -20, pointerEvents: 'none', duration: 0.4 });
                gsap.to('#timer-container', { opacity: 0, y: 20, pointerEvents: 'none', duration: 0.4 });
                gsap.to('.start-btn-container', { opacity: 1, pointerEvents: 'auto', duration: 0.4, ease: "power2.out" });
                gsap.to(particlesGroup.material, { opacity: 0.5, duration: 0.5 });

                // 反向翻轉動畫
                const targetRotationY = loadedModel.rotation.y - Math.PI;
                gsap.to(loadedModel.rotation, {
                    y: targetRotationY,
                    x: 0,
                    z: 0,
                    duration: 0.5,
                    ease: "power2.inOut",
                    onUpdate: function() {
                        if (this.progress() >= 0.5 && modelInner !== bwCube) {
                            colorCube.visible = false;
                            bwCube.visible = true;
                            modelInner = bwCube;
                        }
                    },
                    onComplete: () => {
                        isShuffling = false;
                    }
                });
                return;
            }

            // 1. 隱藏文字與按鈕
            gsap.to(['#menu-content', '#back-btn'], { opacity: 0, pointerEvents: 'none', duration: 0.4, ease: "power2.out" });
            menuItemsDOM.forEach(m => m.style.pointerEvents = '');

            // 關閉所有的棋子旋轉狀態，確保下次打開選單時是乖乖落下後才開始轉
            document.querySelectorAll('.chess-piece').forEach(p => p.autoRotate = false);

            // 2. 琴鍵斑馬線退場 (反向 stagger 退離)
            gsap.to('.zebra-block', {
                scaleX: 0,
                duration: 1,
                stagger: -0.1, // 由右至左逆向收合
                ease: "power3.inOut",
                delay: 0.2, // 等字卡先消失
                onComplete: () => {
                    // 3. 恢復粒子星空與 Start 主按鈕
                    gsap.to(particlesGroup.material, { opacity: 0.5, duration: 1, ease: "power2.inOut" });
                    gsap.to('.start-btn-container', { opacity: 1, duration: 1, pointerEvents: "auto", ease: "power2.inOut" });

                    // 4. 重組魔術方塊
                    const cubies = [];
                    modelInner.traverse(child => { if (child.isMesh) cubies.push(child); });

                    const restorePromises = cubies.map(c => {
                        return new Promise(resolve => {
                            // 將位置與縮放從 0，倒轉還原回剛剛記下的「shuffledPosition」與比例 1
                            gsap.to(c.position, {
                                x: c.userData.shuffledPosition.x,
                                y: c.userData.shuffledPosition.y,
                                z: c.userData.shuffledPosition.z,
                                duration: 1,
                                ease: "power3.out" // 具備強烈磁力吸附感的節奏
                            });
                            gsap.to(c.scale, {
                                x: 1, y: 1, z: 1,
                                duration: 1,
                                ease: "power3.out",
                                onComplete: resolve
                            });
                        });
                    });

                    // 全部聚合完畢後，解除布林值限制，順勢推動方塊全體自轉一次
                    Promise.all(restorePromises).then(() => {
                        isShuffling = false;
                        loadedModel.userData.extraSpin = 15; // 還原後增加華麗的大迴旋力道
                    });
                }
            });
        });

        // ================= model-viewer 西洋棋金屬材質動態設定 =================
        const chessPieces = document.querySelectorAll('.chess-piece');
        chessPieces.forEach(viewer => {
            viewer.addEventListener('load', () => {
                if (viewer.model && viewer.model.materials) {
                    viewer.model.materials.forEach(material => {
                        // 保留原本顏色，但賦予高光澤金屬感
                        material.pbrMetallicRoughness.setMetallicFactor(1.0);
                        material.pbrMetallicRoughness.setRoughnessFactor(0.25);
                    });
                }
            });
        });

    </script>
</body>

</html>
